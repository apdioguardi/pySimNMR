[pytest]
markers =
    slow: marks tests as slow (powder or fitting workflows)
    legacy: legacy script CLI tests
    vary: consolidated nmr-field / nmr-vary-* CLI tests
    freq: single-crystal frequency spectrum CLI tests
    freq_fit: frequency-spectrum fitting CLI tests
    field_spec: single-crystal field-spectrum CLI tests
    field_fit: field-spectrum fitting CLI tests
    freq_powder: powder frequency spectrum CLI tests
    freq_powder_fit: powder frequency fitting CLI tests
    field_powder: powder field spectrum CLI tests
    field_powder_fit: powder field fitting CLI tests
